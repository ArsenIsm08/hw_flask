<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Your Shop{% endblock %}</title>
</head>
<body>
    <header>
        <h1>Your Shop</h1>
        <!-- Меню, навигация или другие элементы шапки -->
    </header>

    <nav>
        <ul>
            <li><a href="{{ url_for('category', category='clothing') }}">Одежда</a></li>
            <li><a href="{{ url_for('category', category='shoes') }}">Обувь</a></li>
            <!-- Другие категории -->
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <!-- Подвал, копирайт и другие элементы -->
    </footer>
</body>
</html>
